<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Film & Dizi Önerileri</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#0d1117;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    width:90%;
}

.card{
    background:#161b22;
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
    position:relative;
}

.card:hover{
    transform:scale(1.05);
    background:#21262d;
}

label{
    display:block;
    padding:20px;
    font-size:20px;
    cursor:pointer;
    text-align:center;
}

input{
    display:none;
}

.content{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.5s ease, padding 0.5s ease;
    background:#0d1117;
}

input:checked ~ .content{
    max-height:200px;
    padding:15px;
}

.content p{
    margin:8px 0;
    opacity:0;
    transform:translateY(-10px);
    animation:fade 0.5s forwards;
}

input:checked ~ .content p{
    animation:fade 0.5s forwards;
}

@keyframes fade{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:900px){
    .container{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:500px){
    .container{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <input type="checkbox" id="aksiyon">
        <label for="aksiyon">💥 Aksiyon</label>
        <div class="content">
            <p>Mad Max: Fury Road</p>
            <p>John Wick</p>
            <p>The Dark Knight</p>
        </div>
    </div>

    <div class="card">
        <input type="checkbox" id="macera">
        <label for="macera">🗺️ Macera</label>
        <div class="content">
            <p>Interstellar</p>
            <p>The Lord of the Rings</p>
            <p>Pirates of the Caribbean</p>
        </div>
    </div>

    <div class="card">
        <input type="checkbox" id="korku">
        <label for="korku">👻 Korku</label>
        <div class="content">
            <p>The Conjuring</p>
            <p>Insidious</p>
            <p>Hereditary</p>
        </div>
    </div>

    <div class="card">
        <input type="checkbox" id="komedi">
        <label for="komedi">😂 Komedi</label>
        <div class="content">
            <p>The Hangover</p>
            <p>Superbad</p>
            <p>Deadpool</p>
        </div>
    </div>

</div>

</body>
</html>
